<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Courier New', monospace">
  <!-- Background -->
  <rect width="900" height="620" fill="#0d1117"/>
  
  <!-- Grid dots -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="#1e3a5f" opacity="0.6"/>
  </pattern>
  <rect width="900" height="620" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#58a6ff" letter-spacing="3">MACHINE À ÉTATS — ANÉMOMÈTRE</text>
  <text x="450" y="62" text-anchor="middle" font-size="11" fill="#8b949e" letter-spacing="2">clk_50M · reset asynchrone raz_n</text>
  <line x1="80" y1="72" x2="820" y2="72" stroke="#21262d" stroke-width="1"/>

  <!-- Defs: arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ==================== STATE: IDLE ==================== -->
  <!-- Circle -->
  <circle cx="200" cy="300" r="80" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="200" cy="300" r="70" fill="#111827" stroke="#1f3a5f" stroke-width="1"/>
  <!-- State label -->
  <text x="200" y="292" text-anchor="middle" font-size="22" font-weight="bold" fill="#58a6ff" letter-spacing="2">IDLE</text>
  <text x="200" y="312" text-anchor="middle" font-size="10" fill="#8b949e">"00"</text>
  <!-- Outputs -->
  <text x="200" y="330" text-anchor="middle" font-size="10" fill="#c9d1d9">data_valid ← 0</text>
  <text x="200" y="345" text-anchor="middle" font-size="10" fill="#c9d1d9">pulse_cnt ← 0</text>

  <!-- ==================== STATE: MEASURE ==================== -->
  <circle cx="700" cy="300" r="80" fill="#0d1117" stroke="#3fb950" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="700" cy="300" r="70" fill="#0d1f12" stroke="#1a3d1e" stroke-width="1"/>
  <text x="700" y="285" text-anchor="middle" font-size="18" font-weight="bold" fill="#3fb950" letter-spacing="2">MEASURE</text>
  <text x="700" y="303" text-anchor="middle" font-size="10" fill="#8b949e">"01"</text>
  <text x="700" y="320" text-anchor="middle" font-size="10" fill="#c9d1d9">data_valid ← 0</text>
  <text x="700" y="335" text-anchor="middle" font-size="10" fill="#c9d1d9">if front↑: pulse_cnt++</text>
  <text x="700" y="350" text-anchor="middle" font-size="10" fill="#c9d1d9">div_cnt actif</text>

  <!-- ==================== STATE: VALID ==================== -->
  <circle cx="450" cy="490" r="80" fill="#0d1117" stroke="#f0883e" stroke-width="2.5"/>
  <circle cx="450" cy="490" r="70" fill="#1a1208" stroke="#3d2c0a" stroke-width="1"/>
  <text x="450" y="478" text-anchor="middle" font-size="20" font-weight="bold" fill="#f0883e" letter-spacing="2">VALID</text>
  <text x="450" y="496" text-anchor="middle" font-size="10" fill="#8b949e">"10"</text>
  <text x="450" y="514" text-anchor="middle" font-size="10" fill="#c9d1d9">data_anemometre ← pulse_cnt</text>
  <text x="450" y="529" text-anchor="middle" font-size="10" fill="#c9d1d9">data_valid ← 1</text>

  <!-- ============================================================ -->
  <!-- TRANSITIONS -->
  <!-- ============================================================ -->

  <!-- IDLE → MEASURE (top arc) -->
  <path d="M 270 260 Q 450 130 630 260" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Label -->
  <text x="450" y="164" text-anchor="middle" font-size="11" fill="#3fb950" font-weight="bold">continu='1' OU start_stop='1'</text>

  <!-- MEASURE → IDLE (bottom of top arc, reverse) -->
  <path d="M 630 340 Q 450 470 270 340" fill="none" stroke="#f85149" stroke-width="2" marker-end="url(#arrow-red)" stroke-dasharray="6,3"/>
  <!-- Label -->
  <text x="450" y="446" text-anchor="middle" font-size="11" fill="#f85149">continu='0' ET start_stop='0'</text>

  <!-- MEASURE → VALID -->
  <path d="M 650 370 Q 580 440 520 455" fill="none" stroke="#f0883e" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="586" y="422" text-anchor="middle" font-size="11" fill="#f0883e" font-weight="bold">tick_1s='1'</text>

  <!-- VALID → MEASURE (continu) -->
  <path d="M 515 440 Q 620 380 650 345" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="5,3"/>
  <text x="618" y="373" text-anchor="middle" font-size="10" fill="#3fb950">continu='1'</text>
  <text x="620" y="385" text-anchor="middle" font-size="10" fill="#3fb950">pulse_cnt←0</text>

  <!-- VALID → IDLE (start_stop='0') -->
  <path d="M 370 470 Q 240 510 200 385" fill="none" stroke="#f85149" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="253" y="496" text-anchor="middle" font-size="10" fill="#f85149">start_stop='0'</text>
  <text x="248" y="508" text-anchor="middle" font-size="10" fill="#f85149">data_valid←0</text>

  <!-- RESET arrow (from top-left into IDLE) -->
  <line x1="90" y1="200" x2="140" y2="265" stroke="#f85149" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="72" y="186" text-anchor="middle" font-size="12" fill="#f85149" font-weight="bold">RESET</text>
  <text x="72" y="200" text-anchor="middle" font-size="10" fill="#f85149">raz_n='0'</text>
  <text x="66" y="214" text-anchor="middle" font-size="10" fill="#c9d1d9">→ IDLE</text>
  <text x="66" y="227" text-anchor="middle" font-size="10" fill="#c9d1d9">tout ← 0</text>

  <!-- Self-loop IDLE -->
  <path d="M 165 225 Q 130 160 190 225" fill="none" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="126" y="180" text-anchor="middle" font-size="9" fill="#58a6ff">sinon</text>

  <!-- Self-loop MEASURE (saturation pulse_cnt=255) -->
  <path d="M 760 230 Q 820 175 770 235" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="4,3"/>
  <text x="844" y="192" text-anchor="middle" font-size="9" fill="#3fb950">pulse_cnt</text>
  <text x="844" y="204" text-anchor="middle" font-size="9" fill="#3fb950">=255</text>
  <text x="844" y="216" text-anchor="middle" font-size="9" fill="#3fb950">(saturation)</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="30" y="540" width="840" height="62" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="50" y="558" font-size="11" fill="#8b949e" font-weight="bold" letter-spacing="1">LÉGENDE</text>

  <line x1="120" y1="556" x2="155" y2="556" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="160" y="560" font-size="10" fill="#c9d1d9">Transition normale</text>

  <line x1="290" y1="556" x2="325" y2="556" stroke="#f85149" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="330" y="560" font-size="10" fill="#c9d1d9">Arrêt / Reset</text>

  <line x1="445" y1="556" x2="480" y2="556" stroke="#f0883e" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="485" y="560" font-size="10" fill="#c9d1d9">Fin mesure (tick_1s)</text>

  <line x1="620" y1="556" x2="655" y2="556" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="660" y="560" font-size="10" fill="#c9d1d9">Rester dans l'état</text>

  <!-- Second legend row -->
  <circle cx="54" cy="580" r="7" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="66" y="584" font-size="10" fill="#c9d1d9">IDLE "00"</text>
  <circle cx="154" cy="580" r="7" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="166" y="584" font-size="10" fill="#c9d1d9">MEASURE "01"</text>
  <circle cx="284" cy="580" r="7" fill="none" stroke="#f0883e" stroke-width="1.5"/>
  <text x="296" y="584" font-size="10" fill="#c9d1d9">VALID "10"</text>
  <text x="410" y="584" font-size="10" fill="#8b949e">state_out codé sur 2 bits pour debug externe</text>

</svg>
